<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Test Intelligence Mesh</title>
  <meta name="description" content="Articles on AI-assisted testing and quality engineering from the Test Intelligence Mesh project.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <span class="red">Test</span><span class="purple">Intelligence</span>&nbsp;Mesh
    </a>
    <ul class="nav-links">
      <li><a href="agents.html">Agents</a></li>
      <li><a href="blog.html">Blog</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Blog</h1>
      <p>
        Articles on AI-assisted quality engineering — written from practice, not theory.
        Add your own by creating a <code>.md</code> file in the <code>posts/</code> directory.
      </p>
    </div>
  </header>

  <section class="section">
    <div class="container-narrow">
      <div id="blog-list" class="blog-list">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-logo">
      <span class="red">Test</span><span class="purple">Intelligence</span> Mesh
    </div>
    <p>
      By CGI Quality Engineering &nbsp;&middot;&nbsp;
      <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>
    </p>
  </footer>

  <script src="site.js"></script>
  <script>
    const listEl = document.getElementById('blog-list');
    POSTS.forEach(post => {
      listEl.insertAdjacentHTML('beforeend', renderPostItem(post));
    });
    setActiveNav('blog.html');
  </script>

</body>
</html>
